<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmberTodo - Premium Todo & Memo App</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Claude의 따뜻한 황금빛 테마와 Todoist의 핵심 기능을 더한 고품격 Todo 및 메모 관리 서비스">
    <meta name="keywords" content="Todo, Memo, Task Manager, AmberTodo, Claude Gold, 할 일 관리, 메모 앱">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <!-- JS Logic -->
    <script src="app.js" defer></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar" id="appSidebar">
            <div class="sidebar-header">
                <div class="app-logo">
                    <i data-lucide="sparkles" class="logo-icon"></i>
                    <h1>AmberTodo</h1>
                </div>
                <button class="theme-toggle-btn" id="themeToggle" aria-label="테마 전환">
                    <i data-lucide="sun" class="sun-icon"></i>
                    <i data-lucide="moon" class="moon-icon"></i>
                </button>
            </div>

            <!-- Progress Dashboard (Todoist Karma Style) -->
            <div class="karma-dashboard">
                <div class="karma-header">
                    <span class="karma-title">오늘의 달성률</span>
                    <span class="karma-percent" id="karmaPercent">0%</span>
                </div>
                <div class="karma-progress-container">
                    <div class="karma-progress-bar" id="karmaProgressBar"></div>
                </div>
                <p class="karma-status-text" id="karmaStatusText">오늘도 활기차게 시작해봐요!</p>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item active" data-filter="all">
                        <a href="#" class="nav-link">
                            <i data-lucide="inbox"></i>
                            <span>전체 메모</span>
                            <span class="count-badge" id="countAll">0</span>
                        </a>
                    </li>
                    <li class="nav-item" data-filter="active">
                        <a href="#" class="nav-link">
                            <i data-lucide="calendar"></i>
                            <span>진행 중</span>
                            <span class="count-badge" id="countActive">0</span>
                        </a>
                    </li>
                    <li class="nav-item" data-filter="completed">
                        <a href="#" class="nav-link">
                            <i data-lucide="check-circle-2"></i>
                            <span>완료됨</span>
                            <span class="count-badge" id="countCompleted">0</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <p>© 2026 AmberTodo</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="app-main">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <div class="app-logo">
                    <i data-lucide="sparkles" class="logo-icon"></i>
                    <h1>AmberTodo</h1>
                </div>
                <button class="menu-toggle-btn" id="menuToggle" aria-label="메뉴 토글">
                    <i data-lucide="menu"></i>
                </button>
            </header>

            <!-- Main Content Container -->
            <div class="content-container">
                <header class="content-header">
                    <div class="welcome-section">
                        <h2 id="greetingText">안녕하세요! 오늘 할 일은 무엇인가요?</h2>
                        <p class="current-date" id="currentDate">2026년 5월 27일 수요일</p>
                    </div>
                </header>

                <!-- Memo Creation Card -->
                <section class="memo-input-section">
                    <form id="todoForm" class="todo-form">
                        <div class="input-group">
                            <input type="text" id="todoTitle" class="todo-input-title" placeholder="무엇을 해야 하나요?" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <textarea id="todoDesc" class="todo-input-desc" placeholder="메모 및 상세 내용을 추가해 보세요... (선택 사항)"></textarea>
                        </div>
                        <div class="form-actions">
                            <div class="priority-selector">
                                <label for="todoPriority">우선순위</label>
                                <div class="priority-options">
                                    <input type="radio" name="priority" id="p1" value="p1">
                                    <label for="p1" class="priority-btn p1" title="우선순위 1 (긴급)">P1</label>

                                    <input type="radio" name="priority" id="p2" value="p2" checked>
                                    <label for="p2" class="priority-btn p2" title="우선순위 2 (높음)">P2</label>

                                    <input type="radio" name="priority" id="p3" value="p3">
                                    <label for="p3" class="priority-btn p3" title="우선순위 3 (보통)">P3</label>

                                    <input type="radio" name="priority" id="p4" value="p4">
                                    <label for="p4" class="priority-btn p4" title="우선순위 4 (낮음)">P4</label>
                                </div>
                            </div>
                            <button type="submit" class="submit-btn" id="addBtn">
                                <i data-lucide="plus"></i>
                                <span>추가</span>
                            </button>
                        </div>
                    </form>
                </section>

                <!-- Search & Filter Controls -->
                <section class="controls-section">
                    <div class="search-bar-wrapper">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="searchInput" placeholder="메모 검색하기...">
                    </div>
                    <div class="sort-wrapper">
                        <i data-lucide="sliders-horizontal" class="sort-icon"></i>
                        <select id="sortSelect" aria-label="정렬 방법">
                            <option value="newest">최신순</option>
                            <option value="oldest">오래된순</option>
                            <option value="priority-desc">우선순위 높은순</option>
                            <option value="priority-asc">우선순위 낮은순</option>
                        </select>
                    </div>
                </section>

                <!-- Todo List Area -->
                <section class="todo-list-section">
                    <div class="todo-grid" id="todoGrid">
                        <!-- Todo Cards will be dynamically inserted here -->
                    </div>
                    <!-- Empty State -->
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon-wrapper">
                            <i data-lucide="check-circle" class="empty-icon"></i>
                        </div>
                        <h3>오늘 해야 할 일을 모두 마쳤습니다!</h3>
                        <p>새로운 메모나 해야 할 일을 작성해 보세요.</p>
                    </div>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
